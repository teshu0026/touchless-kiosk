<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Touchless Kiosk</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
  <!-- Webcam Input (Hidden) -->
  <video id="webcam" autoplay playsinline></video>

  <!-- Gesture Debug Canvas (Optional, for showing landmarks) -->
  <!-- <canvas id="output_canvas"></canvas> -->

  <!-- Main Interface -->
  <div id="app">
    <header>
      <div class="logo">AERO<span class="highlight">TOUCH</span></div>
      <div class="status">
        <span class="status-dot"></span> System Active
      </div>
    </header>

    <main>
      <div class="hero">
        <h1>Welcome to the Future</h1>
        <p>Raise your hand to navigate.</p>
      </div>

      <div class="cards-container">
        <div class="card interactive" id="card-menu">
          <div class="icon">🍔</div>
          <h3>Menu</h3>
          <p>View our delicious items</p>
          <div class="progress-ring"></div>
        </div>
        <div class="card interactive" id="card-order">
          <div class="icon">🛒</div>
          <h3>My Order</h3>
          <p>Review your selection</p>
          <div class="progress-ring"></div>
        </div>
        <div class="card interactive" id="card-help">
          <div class="icon">💬</div>
          <h3>Assistance</h3>
          <p>Call for support</p>
          <div class="progress-ring"></div>
        </div>
      </div>
    </main>

    <footer>
      <p>&copy; 2026 AeroTouch Kiosk. All Rights Reserved. Created by Ritesh Kamboj.</p>
    </footer>

    <!-- Custom Cursor -->
    <div id="cursor" class="cursor">
      <svg class="cursor-ring" width="60" height="60" viewBox="0 0 60 60">
        <circle class="ring-bg" cx="30" cy="30" r="26" stroke-width="4"></circle>
        <circle class="ring-progress" cx="30" cy="30" r="26" stroke-width="4"></circle>
      </svg>
    </div>
  </div>

  <!-- Notification/Feedback Area -->
  <div id="notification" class="hidden">Action Triggered!</div>

  <script type="module" src="/main.js"></script>
</body>

</html>
